<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Problema do Treino Livre - MOJ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <img src="../../img/logo_moj.png" alt="Logo MOJ" />
          <span class="brand-title">MOJ</span>
          <span class="beta-badge">BETA</span>
          <span class="brand-subtitle">Página de Problemas · Treino Livre</span>
        </div>
        <div id="topbar-userbox" class="navlinks">
          <!-- login/logout vai aqui JS -->
        </div>
      </div>
      <!-- Botões rápidos logo abaixo -->
      <nav class="quicknav">
        <a class="quicknav-btn" href="../../">Página Inicial</a>
        <a class="quicknav-btn" href="../" rel="noopener">🔎 Buscar Problemas</a>
        <a class="quicknav-btn" href="https://cd-moj.github.io/cd-moj.docs/" target="_blank" rel="noopener">📕 Documentação</a>
      </nav>

      <h1 id="problem-title" class="main-title">Carregando...</h1>
      <div id="problem-tags" class="blur-tags" style="margin-bottom:1em;">
        <!-- Aqui ficam as tags como links -->
      </div>
      <div class="section" style="padding:2em;" id="statement-box">
        <div id="statement-loading">Carregando problema...</div>
        <div id="statement-content" class="statement-content" style="display:none;"></div>
        <div id="timelimits-box" style="margin-bottom:1.5em; display:none;">
          <h3>Limites de tempo por linguagem</h3>
          <table class="timelimit-table" id="timelimit-table"></table>
        </div>
      </div>

      <div class="section" style="padding:2em;">
        <div id="login-section" style="display:none;">
          <div class="login-prompt">
            Você precisa fazer login para submeter soluções.
          </div>
          <div class="form-box">
            <form id="login-form">
              <label for="login-username">Usuário:</label><br>
              <input type="text" id="login-username" name="username" autocomplete="username" required><br>
              <label for="login-password">Senha:</label><br>
              <input type="password" id="login-password" name="password" autocomplete="current-password" required><br>
              <button type="submit">Entrar</button>
              <div id="login-error" style="color:#a00;font-weight:bold;margin-top:.7em;"></div>
            </form>
          </div>
        </div>
        <div id="submissions-section" style="display:none;">
          <div id="submit-box" style="margin-bottom:2em;">
            <form id="submit-form" enctype="multipart/form-data" class="form-box">
              <label for="file-upload">Selecione seu arquivo:</label><br>
              <input type="file" name="file" id="file-upload" required><br>
              <button type="submit">Enviar solução</button>
              <span id="submit-msg" style="margin-left:1.4em;color:#337f7f;font-size:1em;font-weight:bold;"></span>
            </form>
          </div>
          <h3>Seu histórico de submissões</h3>
          <table class="history-table" id="history-table">
            <thead>
              <tr>
                <th class="sortable" data-sort="date" title="Clique para ordenar por data/hora">Data/Hora <span class="sort-ind"></span></th>
                <th>Arq/Log</th>
                <th class="sortable" data-sort="lang" title="Clique para ordenar por linguagem">Linguagem <span class="sort-ind"></span></th>
                <th class="sortable" data-sort="status" title="Clique para ordenar por status">Status <span class="sort-ind"></span></th>
              </tr>
            </thead>
            <tbody id="history-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
