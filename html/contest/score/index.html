<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Score - Contest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="contest.css">
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="topbar-line1"><div id="contest-title"></div></div>
    <div class="topbar-line2">
      <div class="mojo-brand">
        <img src="/static/logo-moj.png" class="mojo-logo" alt="logo">
        <span class="mojo-label">MOJ</span>
        <span class="beta-badge">BETA</span>
      </div>
      <span class="countdown-contest" id="countdown-contest"></span>
      <button id="logout-btn" type="button">Logout</button>
    </div>
  </div>
  <div id="contest-nav"></div>
  <div class="section" id="user-details"></div>
  <div class="section info-pane" id="info-score-public" style="display:none;background: #fffae0; color:#984412;font-size:1.06em;font-weight:bold;">
    Você está visualizando o placar em modo público (dados restritos ou atrasados).
  </div>
  <div class="section">
    <div id="score-filter-bar"></div>
    <div id="score-table-container"></div>
  </div>
</div>
<script src="api.js"></script>
<script src="../contestid.js"></script>
<script src="user.js"></script>
<script src="nav.js"></script>
<script src="score-colors.js"></script>
<script src="score-regions.js"></script>
<script src="score-search.js"></script>
<script src="score-icpc.js"></script>
<script src="score-obi.js"></script>
<script src="main.js"></script>
</body>
</html>
