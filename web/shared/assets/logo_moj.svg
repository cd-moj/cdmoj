<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MOJ — Melhor Online Judge">
  <title>MOJ</title>
  <defs>
    <linearGradient id="mojTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82e8"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="mojSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset=".55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- tile (app-icon) com leve borda clara p/ separar do topbar escuro -->
  <rect x="5" y="5" width="54" height="54" rx="15" fill="url(#mojTile)" stroke="#ffffff" stroke-opacity=".25" stroke-width="1.5"/>
  <rect x="5" y="5" width="54" height="54" rx="15" fill="url(#mojSheen)"/>
  <!-- veredicto Accepted: o coração de um juiz online -->
  <path d="M18.5 34 l8.8 9 l18 -21" fill="none" stroke="#ffffff" stroke-width="6.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- balãozinho de contest (ICPC) saindo do tile -->
  <circle cx="49.5" cy="15" r="5.2" fill="#ffd23f" stroke="#ffffff" stroke-opacity=".6" stroke-width="1.2"/>
  <path d="M49.5 20.2 q-1.6 2.2 0 4.2" fill="none" stroke="#ffd23f" stroke-width="1.4" stroke-linecap="round"/>
</svg>
