<!DOCTYPE html>
<html lang="pt-br" data-en-doctitle="Create contest — MOJ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar contest — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    .field { margin:.55rem 0 }
    .field label { display:block; font-weight:600; font-size:.9rem; margin-bottom:.2rem }
    .field input, .field select, .field textarea { width:100%; box-sizing:border-box }
    .field input[type=checkbox], .field input[type=radio] { width:auto; vertical-align:middle; margin:0 .45em 0 0 }
    .field label:has(> input[type=checkbox]), .field label:has(> input[type=radio]) { display:inline-flex; align-items:center; font-weight:400 }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:.8rem }
    .prob-row { display:grid; grid-template-columns:46px 1fr auto; gap:.5rem; align-items:start;
      padding:.55rem; border:1px solid #e3e9f2; border-radius:9px; margin:.4rem 0; background:#fafcff }
    .prob-row .letter { text-align:center; font-weight:800 }
    .prob-row .pid { font-family:var(--mono,monospace); font-size:.78rem; color:#64748b; word-break:break-all }
    .bank-results { border:1px solid #e3e9f2; border-radius:9px; max-height:230px; overflow:auto; margin-top:.4rem }
    .bank-item { display:flex; justify-content:space-between; gap:.6rem; padding:.4rem .6rem; border-top:1px solid #eef2f8; align-items:center }
    .bank-item:first-child { border-top:0 }
    .bank-item .t { font-size:.9rem } .bank-item .i { font-family:var(--mono,monospace); font-size:.72rem; color:#94a3b8 }
    .result-card { background:#e7f7ec; border:1px solid #b6e7c6; border-radius:12px; padding:1.1rem 1.2rem; margin-top:1rem }
    .cred { font-family:var(--mono,monospace); background:#fff; border:1px solid #cbd5e1; border-radius:6px; padding:.15rem .4rem }
    .tabs { display:flex; gap:.4rem; margin:.5rem 0 1rem }
    .tabs button { border:1px solid #d7dee8; background:#fff; border-radius:8px; padding:.4rem .9rem; cursor:pointer; font-weight:600 }
    .tabs button.active { background:#1e57c4; color:#fff; border-color:#1e57c4 }
    .warn-box { background:#fff7e0; border:1px solid #f3df9e; color:#7a5c00; padding:.5rem .7rem; border-radius:8px; font-size:.88rem }
    .tag-chip { display:inline-flex; align-items:center; gap:.2rem; background:#e8f0fe; color:#1850a9; border:1px solid #c5d9f5;
      border-radius:999px; padding:.1rem .55rem; font-size:.82rem; font-weight:600 }
    .tag-chip a { color:#1850a9; text-decoration:none }
    .lang-grid { display:flex; flex-wrap:wrap; gap:.3rem .8rem; margin:.3rem 0 }
    .lang-chip { display:inline-flex; align-items:center; font-weight:400; border:1px solid #e3e9f2; border-radius:8px; padding:.2rem .5rem; background:#fff }
    .steps { display:flex; gap:.35rem; margin:.5rem 0 1rem; flex-wrap:wrap }
    .steps button { border:1px solid #d7dee8; background:#fff; border-radius:8px; padding:.35rem .7rem; cursor:pointer; font-weight:600; font-size:.86rem }
    .steps button.active { background:#1e57c4; color:#fff; border-color:#1e57c4 }
    .steps button.done { border-color:#8fbf9f; background:#f2faf4 }
    .wiz-nav { display:flex; gap:.5rem; margin-top:1rem; align-items:center }
    .start-card { border:1px solid #e3e9f2; border-radius:10px; padding:.7rem .9rem; margin:.5rem 0; background:#fafcff }
    .start-card h3 { margin:.1rem 0 .35rem }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="/"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
        <span class="slogan">Criar contest</span></a>
      <div class="spacer"></div>
      <nav class="navlinks">
        <a href="/">Início</a>
        <a href="/treino/">Treino Livre</a>
      </nav>
      <span id="authArea" class="row" style="margin-left:.5rem"></span>
    </div>
  </header>

  <main class="container">
    <div class="row" style="align-items:center;gap:.8rem;margin:.2rem 0 1rem">
      <h1 style="margin:0" data-en="➕ Create contest">➕ Criar contest</h1>
      <span style="flex:1"></span>
      <a class="btn ghost" href="/treino/criar/tutorial.html" target="_blank" data-en="📖 How to create and run a contest">📖 Como criar e gerenciar um contest</a>
    </div>
    <div id="app"><p class="muted" data-en="loading…">carregando…</p></div>
  </main>

  <script type="module" src="/shared/i18n-dom.js"></script>
  <script type="module" src="/shared/site-header.js"></script>
  <script type="module" src="/treino/criar/criar.js"></script>
</body>
</html>
