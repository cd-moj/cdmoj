<!DOCTYPE html>
<html lang="pt-br" data-en-doctitle="Free Training — MOJ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Treino Livre — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    /* explorador de coleções/tags (facetas client-side) */
    .expl-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; align-items:start; margin-top:.6rem; }
    @media (max-width:820px){ .expl-grid { grid-template-columns:1fr; } }
    .expl-panel { background:#fafcff; border:1px solid var(--line); border-radius:12px; padding:.7rem .8rem; min-width:0; }
    .expl-panel h3 { margin:.1rem 0 .5rem; font-size:.92rem; color:var(--blue-dark); }
    .expl-panel input { width:100%; box-sizing:border-box; margin-bottom:.5rem; }
    .ctree { max-height:340px; overflow:auto; }
    .ctree .node { display:flex; align-items:center; gap:.25rem; padding:.08rem 0; }
    .ctree .caret { cursor:pointer; width:1.15rem; text-align:center; color:var(--muted); user-select:none; flex:none; }
    .ctree .kids { margin-left:.55rem; border-left:2px solid #e7ecf5; padding-left:.55rem; }
    .ctree .collection { margin:0; cursor:pointer; }
    .tcloud { max-height:340px; overflow:auto; }
    .tcloud .tag { cursor:pointer; }
    .collection.on { background:#4a37c9; color:#fff; }
    .tag.on { background:var(--blue-dark); color:#fff; }
    .tag.dim { opacity:.4; }
    #active { margin-top:.5rem; }
    #active .chip-x { margin-left:.35rem; font-weight:800; opacity:.7; }
    #active .collection, #active .tag { cursor:pointer; }
    summary.expl-sum { cursor:pointer; font-weight:600; color:var(--blue-dark); }
    /* "mais enviados na semana" (estado inicial) */
    .trend-row { display:flex; align-items:center; gap:.6rem; padding:.4rem .2rem; border-bottom:1px solid #eef2f8; text-decoration:none; color:inherit; }
    .trend-row:last-child { border-bottom:none; }
    .trend-row:hover { background:#f4f8ff; border-radius:8px; }
    .trend-rank { flex:none; width:1.6rem; height:1.6rem; border-radius:50%; background:var(--blue-soft); color:var(--blue-dark); font-weight:800; font-size:.8rem; display:flex; align-items:center; justify-content:center; }
    .trend-ttl { flex:1; min-width:0; font-weight:600; color:var(--blue-dark); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .trend-n { flex:none; font-size:.78rem; color:var(--muted); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="/"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
        <span class="slogan">Melhor Online Judge</span> <span class="badge-beta">BETA</span></a>
      <div class="spacer"></div>
      <nav class="navlinks">
        <a href="/">Página Inicial</a>
        <a href="/problemas/">Gestão de Problemas</a>
        <a href="/docs/" target="_blank">Documentação</a>
        <span id="authArea" class="row"></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="section">
      <div class="row" style="align-items:center;gap:.8rem">
        <h2 style="margin:0" data-en="Free Training — Problems">Treino Livre — Problemas</h2>
        <span style="flex:1"></span>
        <a class="btn ghost" href="/treino/cli.html" target="_blank" data-en="⌨ Submit from the terminal (CLI)">⌨ Enviar pelo terminal (CLI)</a>
      </div>
      <div class="row">
        <input id="q" placeholder="Buscar por título…" data-en-ph="Search by title…" style="flex:1; min-width:220px">
        <select id="filter">
          <option value="all" data-en="All">Todos</option>
          <option value="solved" data-en="Solved">Resolvidos</option>
          <option value="attempted" data-en="Attempted, unsolved">Tentados não resolvidos</option>
        </select>
        <button id="toggleTags" class="btn ghost" data-en="Show tags">Mostrar tags</button>
      </div>
      <details id="explorer" open>
        <summary class="expl-sum small" data-en="🧭 Explore by collection and tag">🧭 Explorar por coleção e tag</summary>
        <div class="expl-grid">
          <div class="expl-panel">
            <h3 data-en="📚 Collections">📚 Coleções</h3>
            <input id="colFilter" placeholder="🔎 filtrar coleções…" data-en-ph="🔎 filter collections…">
            <div id="colTree" class="ctree small"></div>
          </div>
          <div class="expl-panel">
            <h3 data-en="🏷 Tags">🏷 Tags</h3>
            <input id="tagFilter" placeholder="🔎 filtrar tags…" data-en-ph="🔎 filter tags…">
            <div id="tagCloud" class="tcloud"></div>
          </div>
        </div>
      </details>
      <div id="active" class="row" style="align-items:center"></div>
      <div id="count" class="small muted" style="margin-top:.5rem"></div>
    </div>

    <div class="section">
      <div id="pager" class="row" style="margin-bottom:.5rem"></div>
      <div id="list"><span class="muted" data-en="loading…">carregando…</span></div>
    </div>
  </main>

  <script type="module" src="/shared/i18n-dom.js"></script>
  <script type="module" src="/shared/site-header.js"></script>
  <script type="module" src="./treino.js"></script>
</body>
</html>
