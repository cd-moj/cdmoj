<!DOCTYPE html>
<html lang="pt-br" data-en-doctitle="Free Training — MOJ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Treino Livre — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="/"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
        <span class="slogan">Melhor Online Judge</span> <span class="badge-beta">BETA</span></a>
      <div class="spacer"></div>
      <nav class="navlinks">
        <a href="/">Página Inicial</a>
        <a href="/problemas/">Gestão de Problemas</a>
        <a href="/docs/" target="_blank">Documentação</a>
        <span id="authArea" class="row"></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="section">
      <div class="row" style="align-items:center;gap:.8rem">
        <h2 style="margin:0" data-en="Free Training — Problems">Treino Livre — Problemas</h2>
        <span style="flex:1"></span>
        <a class="btn ghost" href="/treino/cli.html" target="_blank" data-en="⌨ Submit from the terminal (CLI)">⌨ Enviar pelo terminal (CLI)</a>
      </div>
      <div class="row">
        <input id="q" placeholder="Buscar por título…" data-en-ph="Search by title…" style="flex:1; min-width:220px">
        <input id="qcol" placeholder="Filtrar por coleção (ex: obi2024)" data-en-ph="Filter by collection (e.g. obi2024)">
        <input id="qtag" placeholder="Filtrar por tag (ex: grafos)" data-en-ph="Filter by tag (e.g. graphs)">
        <select id="filter">
          <option value="all" data-en="All">Todos</option>
          <option value="solved" data-en="Solved">Resolvidos</option>
          <option value="attempted" data-en="Attempted, unsolved">Tentados não resolvidos</option>
        </select>
        <button id="toggleTags" class="btn ghost" data-en="Show tags">Mostrar tags</button>
      </div>
      <div id="count" class="small muted" style="margin-top:.5rem"></div>
      <details id="collIndexWrap" style="margin-top:.5rem">
        <summary class="small" style="cursor:pointer" data-en="Browse by collection ▾">Navegar por coleção ▾</summary>
        <div id="collIndex" class="small" style="margin-top:.4rem;line-height:2"></div>
      </details>
    </div>

    <div class="section">
      <div id="pager" class="row" style="margin-bottom:.5rem"></div>
      <div id="list"><span class="muted" data-en="loading…">carregando…</span></div>
    </div>
  </main>

  <script type="module" src="/shared/i18n-dom.js"></script>
  <script type="module" src="/shared/site-header.js"></script>
  <script type="module" src="./treino.js"></script>
</body>
</html>
