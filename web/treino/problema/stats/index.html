<!DOCTYPE html>
<html lang="pt-br" data-en-doctitle="Problem statistics — Free Training — MOJ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estatísticas do problema — Treino Livre — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.8rem; }
    .metric { background:#fafcff; border:1px solid var(--line); border-radius:12px; padding:.8rem 1rem; }
    .metric .v { font-size:1.55rem; font-weight:800; color:var(--blue-dark); line-height:1.1; }
    .metric .v.sm { font-size:1.02rem; padding-top:.3rem; }
    .metric .l { font-size:.8rem; color:var(--muted); margin-top:.15rem; }
    /* gráficos NO TAMANHO NATURAL (max-width, nunca width:100% — esticar a pizza p/ 560px
       era o bug do desktop); grade com teto de 3 colunas p/ os cards pequenos. */
    .chart-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1rem; align-items:start; }
    .chart-grid > .subcard { min-width:0; }
    .chart-grid svg { max-width:100%; height:auto; display:block; margin:0 auto; }
    @media (min-width:1100px){
      .chart-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
      .chart-grid.two { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    .yearbar { display:flex; flex-wrap:wrap; gap:.35rem; margin:0 0 .7rem; }
    .yearbar .btn { padding:.25rem .7rem; font-size:.85rem; }
    .yearbar .btn.on { background:var(--blue-dark); color:#fff; border-color:var(--blue-dark); }
    .avatar-cloud { display:flex; flex-wrap:wrap; gap:.45rem; }
    .avatar-cloud .avatar-mini { width:40px; height:40px; font-size:15px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="/"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
        <span class="slogan">Melhor Online Judge</span> <span class="badge-beta">BETA</span></a>
      <div class="spacer"></div>
      <nav class="navlinks">
        <a href="/">Página Inicial</a>
        <a href="/treino/">Treino Livre</a>
        <a href="/docs/" target="_blank">Documentação</a>
        <span id="authArea" class="row"></span>
      </nav>
    </div>
  </header>
  <main class="container">
    <div id="content"><span class="muted" data-en="loading…">carregando…</span></div>
  </main>
  <script type="module" src="/shared/i18n-dom.js"></script>
  <script type="module" src="/shared/site-header.js"></script>
  <script type="module" src="./stats.js"></script>
</body>
</html>
