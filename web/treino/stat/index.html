<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estatísticas do Usuário — Treino Livre — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    /* ---- cabeçalho de perfil ---- */
    .profile-head { display:flex; align-items:center; gap:1.2rem; flex-wrap:wrap; }
    .avatar { width:84px; height:84px; border-radius:50%; flex:0 0 auto; object-fit:cover;
      box-shadow:0 2px 10px rgba(20,40,80,.18); border:3px solid #fff; background:#fff; }
    .avatar-ini { display:grid; place-items:center; color:#fff; font-weight:800; font-size:2rem;
      letter-spacing:-.02em; user-select:none; }
    .profile-meta { flex:1; min-width:240px; }
    .profile-meta .pname { font-size:1.55rem; font-weight:850; color:var(--blue-dark); letter-spacing:-.01em; line-height:1.2; }
    .profile-meta .plogin { color:var(--muted); font-family:var(--mono); font-size:.9rem; }
    .profile-meta .pline { margin-top:.25rem; color:var(--ink); font-size:.95rem; }
    .profile-meta .pline .lbl { color:var(--muted); }
    .profile-actions { display:flex; gap:.5rem; flex-wrap:wrap; }
    /* ---- cartões de métricas ---- */
    .stat-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:.7rem; margin-top:1rem; }
    .stat-card { background:#fafcff; border:1px solid var(--line); border-radius:12px; padding:.7rem .9rem; }
    .stat-card .n { font-size:1.5rem; font-weight:800; color:var(--blue-dark); line-height:1.1; font-variant-numeric:tabular-nums; }
    .stat-card .lbl { font-size:.78rem; color:var(--muted); margin-top:.15rem; }
    .stat-card.hl { background:var(--blue-soft); border-color:#cfe0f6; }
    /* ---- grade de gráficos ---- */
    .stat-grid { display:grid; grid-template-columns:1fr; gap:1.2rem; }
    @media (min-width:760px){ .stat-grid.two { grid-template-columns:1fr 1fr; } }
    .stat-grid > div { min-width:0; }
    .chart-title { text-align:center; font-weight:650; color:var(--ink); margin-bottom:.4rem; font-size:.95rem; }
    .legend { display:flex; flex-wrap:wrap; gap:.4rem .9rem; justify-content:center; margin-top:.5rem; font-size:.85rem; color:var(--ink); }
    .legend .sw { display:inline-block; width:.8em; height:.8em; border-radius:3px; margin-right:.3em; vertical-align:-.05em; }
    svg.chart { max-width:100%; height:auto; display:block; margin:auto; }
    .heat-wrap { overflow-x:auto; }
    .private-box { text-align:center; font-size:1.15rem; color:var(--muted); padding:2.2rem 1rem; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="/"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
        <span class="slogan">Melhor Online Judge</span> <span class="badge-beta">BETA</span></a>
      <div class="spacer"></div>
      <nav class="navlinks">
        <a href="/">Página Inicial</a>
        <a href="/treino/">Treino Livre</a>
        <a href="/docs/" target="_blank">Documentação</a>
        <span id="authArea" class="row"></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- cabeçalho de perfil + métricas -->
    <div class="section">
      <div class="profile-head" id="profileHead">
        <div class="muted">carregando…</div>
      </div>
      <div class="stat-cards" id="quickStats"></div>
    </div>

    <!-- corpo do dashboard (escondido se o perfil for privado) -->
    <div id="dashboard"></div>
  </main>

  <script type="module" src="./stat.js"></script>
</body>
</html>
