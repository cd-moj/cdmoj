<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revelação do placar — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    body { background:#0f172a; }
    .wrap { max-width:1200px; margin:1rem auto; padding:0 1rem; }
    h1 { color:#fff; font-size:1.3rem; margin:.4rem 0 .8rem; }
    #status { color:#e2e8f0; }
    .muted { color:#94a3b8; }
    table.score { width:100%; border-collapse:separate; border-spacing:0; background:#fff;
      border-radius:10px; overflow:hidden; font-size:1rem; }
    table.score th, table.score td { padding:.5rem .65rem; text-align:center;
      border-bottom:1px solid #e3e9f2; font-variant-numeric:tabular-nums; white-space:nowrap; }
    table.score th { background:#eef3fb; color:#1e3a8a; font-weight:700; position:sticky; top:0; }
    table.score td.team { text-align:left; }
    .prob-wait-cell { background:#fdf1d0; color:#b45309; font-weight:700; }
    tr.placing-up td { animation:flash-up 1.1s ease; }
    tr.placing-down td { animation:flash-down 1.1s ease; }
    @keyframes flash-up { 0%{background:#d7f5dd;} 100%{background:transparent;} }
    @keyframes flash-down { 0%{background:#fde0e4;} 100%{background:transparent;} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🏆 Revelação do placar</h1>
    <div id="app">Carregando…</div>
  </div>
  <script type="module" src="./reveal.js"></script>
</body>
</html>
