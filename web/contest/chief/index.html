<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Juiz-chefe — Contest — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    .contest-topbar-title { font-weight:800; font-size:1.25rem; }
    .quicknav a.active { text-decoration:underline; }
    .tabbar { display:flex; gap:.4rem; flex-wrap:wrap; margin:.2rem 0 1rem; border-bottom:1px solid #e3e9f2; padding-bottom:.5rem }
    .tabbar button { border:1px solid #d7dee8; background:#fff; border-radius:8px; padding:.4rem .9rem; cursor:pointer; font-weight:600 }
    .tabbar button.active { background:#1e57c4; color:#fff; border-color:#1e57c4 }
    .dash-card { display:inline-block; border:1px solid var(--line); border-radius:.5rem; padding:.35rem .6rem; margin:.15rem }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar" style="flex-direction:column; align-items:stretch; gap:.4rem">
      <div class="contest-topbar-title" id="contestTitle">…</div>
      <div class="row" style="align-items:center">
        <a class="brand" href="/" style="font-size:1rem"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
          <span class="badge-beta">BETA</span></a>
        <div class="spacer"></div>
        <span class="countdown" id="contestCountdown"></span>
        <a class="btn ghost" id="backBtn" href="#">Contest</a>
      </div>
    </div>
  </header>
  <nav class="quicknav"><div class="bar" id="contestNav"></div></nav>
  <main class="container">
    <h1 style="margin:.2rem 0 .3rem">👑 Painel do juiz-chefe</h1>
    <div id="app"><p class="muted">carregando…</p></div>
  </main>
  <script type="module" src="./chief.js"></script>
</body>
</html>
