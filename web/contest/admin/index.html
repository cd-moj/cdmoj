<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin do contest — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <style>
    .field { margin:.5rem 0 }
    .field label { display:block; font-weight:600; font-size:.9rem; margin-bottom:.2rem }
    .field input, .field select, .field textarea { width:100%; box-sizing:border-box }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:.8rem }
    .cred { font-family:var(--mono,monospace); background:#fff; border:1px solid #cbd5e1; border-radius:6px; padding:.1rem .4rem }
    table.moj { width:100%; border-collapse:collapse; font-size:.92rem }
    table.moj th, table.moj td { padding:.35rem .4rem; border-top:1px solid #eef2f8; text-align:left }
    table.moj thead th { border-top:0; color:#64748b; font-size:.82rem }
    .chart-wrap { overflow-x:auto }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="/"><img src="/shared/assets/logo_moj.png" alt="MOJ"> MOJ
        <span class="slogan">Admin do contest</span></a>
      <div class="spacer"></div>
      <nav class="navlinks">
        <a id="backLink" href="#">← Contest</a>
        <a id="scoreLink" href="#">Placar</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <h1 id="ctitle" style="margin:.2rem 0 1rem">Admin do contest</h1>
    <div id="app"><p class="muted">carregando…</p></div>
  </main>
  <script type="module" src="/contest/admin/admin.js"></script>
</body>
</html>
