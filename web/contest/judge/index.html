<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Julgamento — Contest — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    .contest-topbar-title { font-weight:800; font-size:1.25rem; }
    .quicknav a.active { text-decoration:underline; }
    .tools { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin-bottom:.6rem; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar" style="flex-direction:column; align-items:stretch; gap:.4rem">
      <div class="contest-topbar-title" id="contestTitle">…</div>
      <div class="row" style="align-items:center">
        <a class="brand" href="/" style="font-size:1rem"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
          <span class="badge-beta">BETA</span></a>
        <div class="spacer"></div>
        <span class="countdown" id="contestCountdown"></span>
        <a class="btn ghost" id="backBtn" href="#">Contest</a>
      </div>
    </div>
  </header>
  <nav class="quicknav"><div class="bar" id="contestNav"></div></nav>

  <main class="container">
    <div class="section">
      <h2>Submissões Pendentes de Julgamento</h2>
      <div class="tools">
        <input id="fUser" placeholder="🔍 usuário…" style="max-width:160px">
        <input id="fProblem" placeholder="🔍 problema…" style="max-width:160px">
        <label class="small"><input type="checkbox" id="onlyPending" checked> Só pendentes</label>
        <button class="btn ghost" id="refreshBtn">Atualizar</button>
      </div>
      <div id="judgeContainer"><span class="muted">carregando…</span></div>
    </div>
  </main>
  <script type="module" src="./judge.js"></script>
</body>
</html>
