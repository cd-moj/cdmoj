<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Impressão — Contest — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    .contest-topbar-title { font-weight:800; font-size:1.25rem; }
    .quicknav a.active { text-decoration:underline; }
    .bk-row { display:flex; justify-content:space-between; align-items:center; gap:.6rem;
      border-top:1px solid var(--line); padding:.4rem 0; flex-wrap:wrap }
    .bk-up { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin:.4rem 0 .8rem }
    .pr-badge { font-size:.8rem; padding:.05rem .4rem; border-radius:.5rem; border:1px solid var(--line) }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar" style="flex-direction:column; align-items:stretch; gap:.4rem">
      <div class="contest-topbar-title" id="contestTitle">…</div>
      <div class="row" style="align-items:center">
        <a class="brand" href="/" style="font-size:1rem"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
          <span class="badge-beta">BETA</span></a>
        <div class="spacer"></div>
        <span class="countdown" id="contestCountdown"></span>
        <a class="btn ghost" id="backBtn" href="#">Contest</a>
      </div>
    </div>
  </header>
  <nav class="quicknav"><div class="bar" id="contestNav"></div></nav>
  <main class="container">
    <h1 style="margin:.2rem 0 .3rem">🖨️ Impressão</h1>
    <p class="muted small" style="margin:.1rem 0 1rem">Peça a impressão de um arquivo (PDF, imagem, texto ou código-fonte). A equipe de impressão da sua sede vai imprimir e <b>entregar em mãos</b>. Acompanhe o status do seu pedido aqui.</p>
    <div id="app"><p class="muted">carregando…</p></div>
  </main>
  <script type="module" src="./print.js"></script>
</body>
</html>
