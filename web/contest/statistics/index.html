<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estatísticas — Contest — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <style>
    .contest-topbar-title { font-weight:800; font-size:1.25rem; }
    .quicknav a.active { text-decoration:underline; }
    .stat-grid { display:flex; gap:1.2rem; flex-wrap:wrap; }
    .stat-grid > div { flex:1; min-width:280px; }
    .chart-title { text-align:center; font-weight:600; margin-bottom:.3rem; }
    .legend { display:flex; flex-wrap:wrap; gap:.4rem .9rem; justify-content:center; margin-top:.5rem; font-size:.85rem; }
    .legend .sw { display:inline-block; width:.8em; height:.8em; border-radius:3px; margin-right:.3em; vertical-align:-.05em; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar" style="flex-direction:column; align-items:stretch; gap:.4rem">
      <div class="contest-topbar-title" id="contestTitle">…</div>
      <div class="row" style="align-items:center">
        <a class="brand" href="/" style="font-size:1rem"><img src="/shared/assets/logo_moj.png" alt="MOJ"> MOJ
          <span class="badge-beta">BETA</span></a>
        <div class="spacer"></div>
        <span class="countdown" id="contestCountdown"></span>
        <a class="btn ghost" id="backBtn" href="#">Contest</a>
      </div>
    </div>
  </header>
  <nav class="quicknav"><div class="bar" id="contestNav"></div></nav>

  <main class="container">
    <div class="section">
      <h2>Estatísticas por problema</h2>
      <div id="problemTable"><span class="muted">carregando…</span></div>
      <div class="stat-grid" style="margin-top:1rem">
        <div><div class="chart-title">Submissões por problema</div><div id="pieSubs"></div></div>
        <div><div class="chart-title">Accepted por problema</div><div id="pieAcc"></div></div>
      </div>
    </div>
    <div class="section">
      <h2>Por linguagem</h2>
      <div class="stat-grid">
        <div><div class="chart-title">Submissões por linguagem</div><div id="pieLang"></div></div>
        <div><div class="chart-title">Veredictos</div><div id="pieVerdict"></div></div>
      </div>
    </div>
  </main>
  <script type="module" src="./statistics.js"></script>
</body>
</html>
