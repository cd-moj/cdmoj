<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estatísticas — Contest — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    .contest-topbar-title { font-weight:800; font-size:1.25rem; }
    .quicknav a.active { text-decoration:underline; }
    .stat-cards { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem }
    .stat-card { flex:1; min-width:150px; background:#fff; border:1px solid #e3e9f2; border-radius:12px; padding:1rem 1.1rem; box-shadow:0 2px 10px rgba(20,40,80,.05) }
    .big-num { font-size:2rem; font-weight:800; line-height:1; font-variant-numeric:tabular-nums }
    .big-sub { color:#64748b; font-size:.88rem; margin-top:.2rem }
    .two-col { display:flex; gap:1.2rem; flex-wrap:wrap }
    .two-col > div { flex:1 1 320px; min-width:0 }   /* min-width:0 deixa o flex encolher */
    .chart-title { text-align:center; font-weight:600; margin-bottom:.3rem }
    /* SVGs responsivos: caem dentro da coluna sem estourar a borda */
    svg.chart { max-width:100%; height:auto; display:block; margin:0 auto }
    .vp-table td.hot { font-weight:700 }
    table.moj { width:100%; border-collapse:collapse; font-size:.9rem }
    table.moj th, table.moj td { padding:.35rem .45rem; border-top:1px solid #eef2f8; text-align:left }
    table.moj thead th { border-top:0; color:#64748b; font-size:.82rem }
    table.moj td.n { text-align:right; font-variant-numeric:tabular-nums }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar" style="flex-direction:column; align-items:stretch; gap:.4rem">
      <div class="contest-topbar-title" id="contestTitle">…</div>
      <div class="row" style="align-items:center">
        <a class="brand" href="/" style="font-size:1rem"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
          <span class="badge-beta">BETA</span></a>
        <div class="spacer"></div>
        <span class="countdown" id="contestCountdown"></span>
        <a class="btn ghost" id="backBtn" href="#">Contest</a>
      </div>
    </div>
  </header>
  <nav class="quicknav"><div class="bar" id="contestNav"></div></nav>
  <main class="container">
    <h1 style="margin:.2rem 0 1rem">📊 Estatísticas</h1>
    <div id="app"><p class="muted">carregando…</p></div>
  </main>
  <script type="module" src="./statistics.js"></script>
</body>
</html>
