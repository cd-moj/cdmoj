<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Status do MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
  <link rel="icon" type="image/svg+xml" href="/shared/assets/logo_moj.svg">
  <style>
    .status-banner { display:flex; align-items:center; gap:.7rem; padding:1rem 1.2rem; border-radius:12px;
      font-weight:700; margin-bottom:1rem; font-size:1.1rem }
    .status-banner.ok   { background:#e7f7ec; color:#137a3b; border:1px solid #b6e7c6 }
    .status-banner.warn { background:#fff7e0; color:#9a6700; border:1px solid #f3df9e }
    .status-banner.down { background:#fdeaea; color:#b3261e; border:1px solid #f3c0bd }
    .status-dot { width:13px; height:13px; border-radius:50%; display:inline-block; flex:0 0 auto }
    .status-dot.ok{ background:#1f9d55 } .status-dot.warn{ background:#d99e00 } .status-dot.down{ background:#d9433f }
    .probs { margin:-.4rem 0 1.1rem 1.2rem; font-size:.9rem; color:#64748b }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:1rem }
    .stat-card { background:#fff; border:1px solid #e3e9f2; border-radius:12px; padding:1.1rem 1.2rem;
      box-shadow:0 2px 10px rgba(20,40,80,.05) }
    .stat-card h3 { margin:0 0 .7rem; font-size:1rem }
    .big-num { font-size:2.2rem; font-weight:800; line-height:1; font-variant-numeric:tabular-nums }
    .big-sub { color:#64748b; font-size:.9rem; margin-top:.2rem }
    .kv { display:flex; justify-content:space-between; gap:.6rem; padding:.34rem 0; border-top:1px solid #eef2f8; font-size:.92rem }
    .kv.first { border-top:0 }
    .ind { font-weight:700 } .ind.ok{ color:#137a3b } .ind.down{ color:#b3261e } .ind.warn{ color:#9a6700 }
    .qtable { width:100%; border-collapse:collapse; margin-top:.4rem; font-size:.9rem }
    .qtable td { padding:.3rem .2rem; border-top:1px solid #eef2f8 }
    .qtable td.n { text-align:right; font-weight:700; font-variant-numeric:tabular-nums }
    .upd { color:#94a3b8; font-size:.82rem; margin-top:1.1rem }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="/"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
        <span class="slogan">Status</span></a>
      <div class="spacer"></div>
      <nav class="navlinks">
        <a href="/">← Início</a>
        <a href="/treino/">Treino Livre</a>
      </nav>
      <span id="authArea" class="row" style="margin-left:.5rem"></span>
    </div>
  </header>

  <main class="container">
    <h1 style="margin:.2rem 0 1rem">Status do sistema</h1>
    <div id="app"><p class="muted">carregando…</p></div>
  </main>

  <script type="module" src="/shared/site-header.js"></script>
  <script type="module" src="/status/status.js"></script>
</body>
</html>
