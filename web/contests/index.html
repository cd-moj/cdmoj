<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contests encerrados — MOJ</title>
  <link rel="stylesheet" href="/shared/ui.css">
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="/"><img src="/shared/assets/logo_moj.svg" alt="MOJ"> MOJ
        <span class="slogan">Melhor Online Judge</span> <span class="badge-beta">BETA</span></a>
      <div class="spacer"></div>
      <nav class="navlinks">
        <a href="/#news">Notícias</a>
        <a href="/#contests">Contests</a>
        <a href="/treino/">Treino Livre</a>
        <a href="/status/">Status</a>
        <a href="/docs/" target="_blank">Documentação</a>
      </nav>
      <span id="authArea" class="row" style="margin-left:.5rem"></span>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="row" style="align-items:baseline; gap:.6rem; flex-wrap:wrap">
        <h2 style="margin:0">⚪ Contests encerrados</h2>
        <span class="count" id="count">…</span>
        <div class="spacer"></div>
        <a class="btn ghost" href="/#contests" style="padding:.32rem .7rem; font-size:.82rem">← abertos / por vir</a>
      </div>
      <p class="muted small" style="margin:.3rem 0 .9rem">Arquivo completo de todos os contests já encerrados. Abra um para ver o enunciado/placar.</p>
      <input id="filter" placeholder="🔎 Filtrar por nome ou id…" style="width:100%; margin-bottom:.9rem" autofocus>
      <div id="list"><div class="muted small">carregando…</div></div>
      <div id="pager" class="row" style="margin-top:1rem; justify-content:center"></div>
    </section>
  </main>

  <script type="module" src="./contests.js"></script>
</body>
</html>
