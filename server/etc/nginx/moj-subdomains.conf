# <ID>.moj.charge.naquadah.com.br  ->  ambiente isolado de UM contest.
# Mesmo web/ + API do MOJ, mas o contest vem do subdomínio (CONTEST_HOST) e o
# backend/Frontend bloqueiam qualquer coisa fora desse contest (treino/outro contest).
# O server_name exato "moj.charge..." (moj.conf) tem precedência para o site principal;
# este regex pega só <algo>.moj.charge...
#
# ESTE É O MODELO **DEV** (nginx user-space, como o próprio usuário, em 8080/8443, sob
# ~/nginx-proxy/). Em **PRODUÇÃO** (nginx do sistema, root, 80/443) use os templates
# moj-prod.conf.in + moj-app.conf.in via `server/bin/install-nginx.sh` — lá um único server
# block serve o site principal E os subdomínios (o CONTEST_HOST sai de um `map`). Ver docs/DEPLOY.md.
server {
    listen  8080;
    listen  [::]:8080;
    listen  8443       ssl;
    listen  [::]:8443  ssl;

    server_name  ~^(?<contestid>[a-z0-9][a-z0-9._-]*)\.moj\.charge\.naquadah\.com\.br$;

    ssl_certificate      /home/ribas/nginx-proxy/certs/fullchain.pem;
    ssl_certificate_key  /home/ribas/nginx-proxy/certs/privkey.pem;
    include              /home/ribas/nginx-proxy/snippets/ssl_params.conf;

    access_log  /home/ribas/nginx-proxy/logs/moj-subdomain.access.log  main;
    error_log   /home/ribas/nginx-proxy/logs/moj-subdomain.error.log   warn;

    root   /home/ribas/moj/cdmoj/web;
    index  index.html;
    client_max_body_size  25m;

    # --- API: bash router via fcgiwrap (socket user-space) --------------------
    location /api/v1/ {
        fastcgi_pass            unix:/home/ribas/moj/run/fcgiwrap.sock;
        fastcgi_split_path_info ^(/api/v1)(/.*)$;
        fastcgi_param  SCRIPT_FILENAME   /home/ribas/moj/cdmoj/server/api/v1/router.sh;
        fastcgi_param  PATH_INFO         $fastcgi_path_info;
        fastcgi_param  REQUEST_METHOD    $request_method;
        fastcgi_param  QUERY_STRING      $query_string;
        fastcgi_param  CONTENT_TYPE      $content_type;
        fastcgi_param  CONTENT_LENGTH    $content_length;
        fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param  HTTP_USER_AGENT    $http_user_agent;
        fastcgi_param  HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param  HTTP_X_REAL_IP     $http_x_real_ip;
        fastcgi_param  REMOTE_ADDR       $remote_addr;
        fastcgi_param  SERVER_PROTOCOL   $server_protocol;
        fastcgi_param  GATEWAY_INTERFACE CGI/1.1;
        # contest isolado vindo do subdomínio (router.sh impõe o isolamento)
        fastcgi_param  CONTEST_HOST      $contestid;
        fastcgi_read_timeout 120s;
    }

    location /docs/ { alias /home/ribas/moj/cdmoj/docs/; autoindex on; }

    location / {
        try_files $uri $uri/ =404;
    }
}
