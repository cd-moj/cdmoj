# MOJ server — configuração base (sourced por lib/common.sh).
# Usa `: "${VAR:=default}"` para que variáveis de ambiente tenham precedência
# (permite override em testes e por instância). Ajuste os caminhos por deploy.

: "${CONTESTSDIR:=/home/ribas/moj/contests}"      # dados dos contests (fonte da verdade)
: "${RUNDIR:=/home/ribas/moj/run}"                # estado de runtime (não versionado)
: "${SESSIONDIR:=$RUNDIR/sessions}"               # sessões (tokens) — modo 700
: "${SPOOLDIR:=$RUNDIR/spool/submissions}"        # fila de submissões (daemon consome)
: "${SPOOLDONEDIR:=$RUNDIR/spool/submissions-done}"
: "${NEWSDIR:=/home/ribas/moj/cdmoj/server/var/news}"   # notícias (JSON por arquivo)
: "${BASEURL:=/api/v1}"
: "${DEFAULT_SCORE_MODE:=icpc}"                   # default p/ contests sem CONTEST_TYPE
: "${UNAME_CHANGE_LIMIT:=2}"                       # trocas de username permitidas por ano (treino)
: "${PROBLEM_STATS_TTL_MIN:=10}"                   # cache de estatísticas por problema (minutos)
